<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UniLexical – Vanilla JS</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }
      .page {
        max-width: 820px;
        margin: 0 auto;
        padding: 32px 20px 80px;
      }
      h1 { font-size: 1.5rem; margin: 0 0 8px; }
      .sub { color: #64748b; margin-bottom: 20px; font-size: 14px; }
      .split {
        display: flex;
        flex-direction: column;
        gap: 24px;
      }
      .panel-title {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #64748b;
        margin: 0 0 8px;
      }
      .panel {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        overflow: hidden;
      }
      .panel-body {
        padding: 0;
      }
      /* Demo shell only — preview host itself has no library chrome */
      #preview {
        padding: 16px 18px;
        min-height: 200px;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 16px 0;
      }
      .actions button {
        border: 1px solid #e2e8f0;
        background: #fff;
        border-radius: 6px;
        padding: 6px 12px;
        font-size: 13px;
        cursor: pointer;
      }
      .actions button:hover { background: #f1f5f9; }
      pre {
        background: #0f172a;
        color: #e2e8f0;
        padding: 14px;
        border-radius: 8px;
        font-size: 12px;
        overflow: auto;
        max-height: 200px;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <h1>UniLexical · Native JS</h1>
      <p class="sub">
        Editor + live Preview · Drag handle · Slash menu · Markdown shortcuts
      </p>
      <div class="split">
        <div>
          <p class="panel-title">Editor</p>
          <div class="panel">
            <div id="editor"></div>
          </div>
        </div>
        <div>
          <p class="panel-title">Preview</p>
          <div class="panel">
            <div class="panel-body">
              <!-- Host is bare; UniPreview injects .uni-preview inside -->
              <div id="preview"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="actions">
        <button id="btn-md">Export Markdown</button>
        <button id="btn-html">Export HTML</button>
        <button id="btn-json">Export JSON</button>
        <button id="btn-load-md">Load sample Markdown</button>
      </div>
      <pre id="out">// export source</pre>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
